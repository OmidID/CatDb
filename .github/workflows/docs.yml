name: Deploy Docs

# Runs on merge to main, not on release — release events fire from a tag, and GitHub Actions
# reads workflow files from the tag's commit, not the default branch. That commit predates whatever
# workflow changes landed since, so a docs job living in release.yml either runs stale or not at
# all. Docs content doesn't need to track a release tag anyway; deploy straight from main.
on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'Directory.Build.props'
      - '.github/workflows/docs.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy-docs:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install deps
        working-directory: docs
        run: npm ci

      - name: Build docs site
        working-directory: docs
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
